<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lección 36 - HTML File Paths</title>
</head>

<body>

    <h1>Rutas de archivos</h1>

    <p>
        Las imágenes pueden cargarse utilizando rutas relativas o absolutas.
    </p>

    <h2>Ruta relativa</h2>

    <img src="imagenes/computadora.jpg" alt="Computadora" width="250">

    <p>
        En este ejemplo la imagen debería encontrarse dentro de la carpeta
        <strong>imagenes</strong>.
    </p>

</body>

</html>
