<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Lección 27 - HTML Unordered Lists</title>
</head>

<body>

<h1>Lista desordenada</h1>

<p>Ejemplo utilizando la etiqueta ul.</p>

<ul>
<li>Teclado</li>
<li>Mouse</li>
<li>Monitor</li>
<li>CPU</li>
</ul>

<h2>Otro estilo</h2>

<ul style="list-style-type:square;">
<li>Rojo</li>
<li>Azul</li>
<li>Verde</li>
</ul>

</body>

</html>
