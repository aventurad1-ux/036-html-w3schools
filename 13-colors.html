<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lección 13 - HTML Colors</title>
</head>

<body>

    <h1 style="background-color:DodgerBlue; color:white;">
        Colores en HTML
    </h1>

    <p style="color:Tomato;">
        Este texto tiene color rojo.
    </p>

    <p style="color:MediumSeaGreen;">
        Este texto tiene color verde.
    </p>

    <p style="background-color:LightGray;">
        Este párrafo tiene un color de fondo gris claro.
    </p>

    <h2 style="border:2px solid Violet;">
        Este encabezado tiene un borde de color violeta.
    </h2>

    <p>
        HTML permite utilizar nombres de colores para mejorar la apariencia de una página.
    </p>

</body>

</html>
