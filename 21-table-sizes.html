<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lección 21 - HTML Table Sizes</title>

    <style>

        table, th, td{
            border:1px solid black;
            border-collapse:collapse;
        }

        table{
            width:60%;
        }

        th{
            height:50px;
        }

    </style>

</head>

<body>

<h1>Tamaño de tablas</h1>

<table>

<tr>
<th>Curso</th>
<th>Nota</th>
</tr>

<tr>
<td>Programación</td>
<td>90</td>
</tr>

<tr>
<td>Base de Datos</td>
<td>88</td>
</tr>

</table>

</body>

</html>
