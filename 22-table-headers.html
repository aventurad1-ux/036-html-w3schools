<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Lección 22 - HTML Table Headers</title>

<style>

table, th, td{
border:1px solid black;
border-collapse:collapse;
padding:8px;
}

</style>

</head>

<body>

<h1>Encabezados de tabla</h1>

<table>

<tr>
<th>Nombre</th>
<th>Carrera</th>
<th>Semestre</th>
</tr>

<tr>
<td>Angel</td>
<td>Ingeniería</td>
<td>Octavo</td>
</tr>

<tr>
<td>José</td>
<td>Administración</td>
<td>Sexto</td>
</tr>

</table>

</body>

</html>
