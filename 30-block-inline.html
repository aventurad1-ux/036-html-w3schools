<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lección 30 - HTML Block and Inline</title>
</head>

<body>

    <h1>Elementos Block e Inline</h1>

    <h2>Elemento Block</h2>

    <div style="background-color: lightgray;">
        Este es un elemento div.

    <p>
        Mi color favorito es

    </p>
