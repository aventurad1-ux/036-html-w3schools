<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Lección 25 - Table Styling</title>

<style>

table{
width:60%;
border-collapse:collapse;
}

th{
background-color:lightblue;
}

table,th,td{
border:1px solid black;
padding:8px;
}

tr:nth-child(even){
background-color:#f2f2f2;
}

</style>

</head>

<body>

<h1>Estilo de tablas</h1>

<table>

<tr>
<th>Curso</th>
<th>Estado</th>
</tr>

<tr>
<td>HTML</td>
<td>Completado</td>
</tr>

<tr>
<td>CSS</td>
<td>En proceso</td>
</tr>

<tr>
<td>JavaScript</td>
<td>Pendiente</td>
</tr>

</table>

</body>

</html>
