<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lección 19 - HTML Tables</title>

    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
        }
    </style>

</head>

<body>

    <h1>Tabla de estudiantes</h1>

    <table>

        <tr>
            <th>Nombre</th>
            <th>Carrera</th>
            <th>Semestre</th>
        </tr>

        <tr>
            <td>Angel</td>
            <td>Ingeniería en Sistemas</td>
            <td>Octavo</td>
        </tr>

        <tr>
            <td>Carlos</td>
            <td>Administración</td>
            <td>Sexto</td>
        </tr>

        <tr>
            <td>Ana</td>
            <td>Contaduría</td>
            <td>Cuarto</td>
        </tr>

    </table>

</body>

</html>
