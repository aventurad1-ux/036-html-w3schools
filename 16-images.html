<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lección 16 - HTML Images</title>
</head>

<body>

    <h1>Imágenes en HTML</h1>

    <p>
        La siguiente imagen se muestra utilizando la etiqueta img.
    </p>

    <img src="https://www.w3schools.com/html/img_girl.jpg"
         alt="Imagen de ejemplo"
         width="300">

    <p>
        El atributo <strong>alt</strong> sirve para mostrar un texto si la imagen
        no puede cargarse.
    </p>

</body>

</html>
