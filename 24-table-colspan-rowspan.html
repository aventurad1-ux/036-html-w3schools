<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lección 24 - Table Colspan y Rowspan</title>

    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 8px;
        }
    </style>

</head>

<body>

    <h1>Colspan y Rowspan</h1>

    <table>

        <tr>
            <th colspan="2">Información del estudiante</th>
        </tr>

        <tr>
            <td>Nombre</td>
            <td>Estuardo</td>
        </tr>

        <tr>
            <td rowspan="2">Cursos</td>
            <td>Desarrollo Web</td>
        </tr>

        <tr>
            <td>Arquitectura</td>
        </tr>

    </table>

</body>

</html>
