<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>Lección 17 - HTML Favicon</title>

    <!-- Ejemplo de favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">

</head>

<body>

    <h1>Favicon en HTML</h1>

    <p>
        Un favicon es el pequeño icono que aparece en la pestaña del navegador.
    </p>

    <p>
        Para que funcione, el archivo <strong>favicon.ico</strong> debe estar en la misma carpeta que esta página.
    </p>

</body>

</html>
