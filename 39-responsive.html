<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lección 39 - HTML Responsive</title>

</head>

<body>

<h1>Diseño Responsive</h1>

<p>
La etiqueta viewport ayuda a que la página se adapte mejor a diferentes dispositivos.
</p>

<img src="https://www.w3schools.com/html/img_chania.jpg"
alt="Imagen"
style="max-width:100%;height:auto;">

<p>
Si reduces el tamaño de la ventana del navegador, la imagen se ajustará automáticamente.
</p>

</body>

</html>
