<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lección 28 - HTML Ordered Lists</title>
</head>

<body>

    <h1>Lista ordenada</h1>

    <p>Ejemplo utilizando la etiqueta <strong>ol</strong>.</p>

    <ol>
        <li>Encender la computadora.</li>
        <li>Abrir Visual Studio Code.</li>
        <li>Crear un archivo HTML.</li>
        <li>Guardar el archivo.</li>
    </ol>

    <h2>Lista con letras</h2>

    <ol type="A">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

</body>

</html>
