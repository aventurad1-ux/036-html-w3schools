<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lección 20 - HTML Table Borders</title>

    <style>
        table, th, td {
            border: 1px solid black;
        }
    </style>

</head>

<body>

    <h1>Tabla con bordes</h1>

    <table>

        <tr>
            <th>Nombre</th>
            <th>Edad</th>
        </tr>

        <tr>
            <td>Mateo</td>
            <td>22</td>
        </tr>

        <tr>
            <td>María</td>
            <td>21</td>
        </tr>

    </table>

</body>

</html>
