<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 48 - HTML vs XHTML</title>

</head>

<body>

    <h1>HTML vs. XHTML</h1>

    <h2>HTML</h2>

    <ul>
        <li>Es más flexible.</li>
        <li>No siempre exige cerrar todas las etiquetas.</li>
    </ul>

    <h2>XHTML</h2>

    <ul>
        <li>Las etiquetas deben cerrarse correctamente.</li>
        <li>Los nombres de las etiquetas se escriben en minúsculas.</li>
        <li>Los atributos deben llevar comillas.</li>
    </ul>

</body>

</html>
