<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lección 14 - HTML CSS</title>

    <style>
        body {
            background-color: whitesmoke;
        }

        h1 {
            color: darkblue;
            text-align: center;
        }

        p {
            color: black;
            font-size: 18px;
        }
    </style>

</head>

<body>

    <h1>CSS Interno</h1>

    <p>
        Este ejemplo utiliza CSS dentro de la etiqueta &lt;style&gt;.
    </p>

    <p>
        Con CSS podemos cambiar colores, tamaños y la apariencia de una página.
    </p>

</body>

</html>
