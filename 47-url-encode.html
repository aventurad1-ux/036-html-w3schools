<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 47 - HTML URL Encode</title>

</head>

<body>

    <h1>HTML URL Encode</h1>

    <p>
        Algunas direcciones web contienen caracteres especiales que deben
        codificarse.
    </p>

    <h2>Ejemplos</h2>

    <p>
        Espacio = %20
    </p>

    <p>
        Signo de interrogación = %3F
    </p>

    <p>
        Ampersand = %26
    </p>

</body>

</html>
